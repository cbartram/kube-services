namespace: n8n
replicaCount: 1

image:
  repository: docker.n8n.io/n8nio/n8n
  pullPolicy: Always
  tag: "latest"

labels:
  app: n8n

service:
  type: ClusterIP
  port: 5678
  protocol: TCP

persistence:
  enabled: true
  existingClaim: n8n-pvc
  mountPath: /home/node/.n8n

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  initChownEnabled: true

resources:
   limits:
     cpu: 200m
     memory: 512Mi
   requests:
     cpu: 200m
     memory: 512Mi
