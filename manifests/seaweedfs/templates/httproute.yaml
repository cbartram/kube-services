apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweedfs-api-route
  namespace: {{.Values.namespace}}
spec:
  parentRefs:
    - name: kraken-gateway
      namespace: kraken
      sectionName: http-subdomain
  hostnames:
    - "seaweed.kraken-plugins.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: "3600s"
        backendRequest: "3600s"
      backendRefs:
        - name: seaweedfs-svc
          port: {{.Values.service.s3Port}}
{{/* Commented out because there is no auth on this so just locally port-forward it. Anyone could upload files */}}
