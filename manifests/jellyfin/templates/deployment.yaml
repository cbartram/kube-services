apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Values.namespace}}
  namespace: {{.Values.namespace}}
  labels:
    {{- toYaml .Values.labels | nindent 4 }}
spec:
  revisionHistoryLimit: 1
  replicas: {{.Values.replicaCount}}
  selector:
    matchLabels:
      {{- toYaml .Values.labels | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- toYaml .Values.labels | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: {{ .Values.service.protocol }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: 8096
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: 8096
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: jellyfin-config
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.cache.enabled }}
            - name: jellyfin-cache
              mountPath: {{ .Values.cache.mountPath }}
            {{- end }}
            {{- if .Values.media.enabled }}
            - name: jellyfin-media
              mountPath: {{ .Values.media.mountPath }}
              readOnly: {{ .Values.media.readOnly }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: jellyfin-config
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.claimName }}
        {{- end }}
        {{- if .Values.cache.enabled }}
        - name: jellyfin-cache
          {{- if eq .Values.cache.type "emptyDir" }}
          emptyDir:
            sizeLimit: {{ .Values.cache.sizeLimit }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ .Values.cache.claimName }}
          {{- end }}
        {{- end }}
        {{- if .Values.media.enabled }}
        - name: jellyfin-media
          persistentVolumeClaim:
            claimName: {{ .Values.media.claimName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
