{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name }}
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.parentName }}
      namespace: {{ .Values.httpRoute.parentNamespace }}
      # We listen on http port because cloudflare is configured to send traffic to http://kraken-istio-gateway.kraken.svc.cluster.local:80
      # i.e. User -> Cloudflare -> SSL edge termination -> direct to istio (Kraken Gateway) -> Service based on the hostname header
      sectionName: {{ .Values.httpRoute.sectionName }}
  hostnames:
    - {{ .Values.httpRoute.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.pathPrefix }}
      timeouts:
        request: {{ .Values.httpRoute.requestTimeout | quote }}
        backendRequest: {{ .Values.httpRoute.backendRequestTimeout | quote }}
      backendRefs:
        - name: {{ .Values.service.name }}
          port: {{ .Values.service.port }}
{{- end }}
